<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
  <title>爱秀·季</title>
  <!-- jquery插件 -->
  <script src="/plugins/jquery-3.6.0.min.js" type="text/javascript"></script>
  <!-- DataTables表格样式 -->
  <script src="/plugins/datatables.min.js" type="text/javascript"></script>
  <link href="/plugins/datatables.min.css" rel="stylesheet">
  <link href="/css/table.css" rel="stylesheet">
  <!-- bootstrap插件 -->
  <script src="/plugins/bootstrap-5.1.3-dist/js/bootstrap.bundle.min.js" type="text/javascript"></script>
  <link href="/plugins/bootstrap-5.1.3-dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- 日期插件 -->
  <script language="javascript" src="/plugins/My97DatePicker/WdatePicker.js" type="text/javascript"></script>
  <!-- 通用样式 -->
  <link href="/css/general.css" rel="stylesheet">
</head>

<body>
<div style="margin-bottom: 10px;">
  <label style="margin-left: 20px;">日期维度：</label>
  <select id="dateDim" style="width: 100px;">
    <option value="day">按天</option>
    <option value="month">按月</option>
    <option value="year">按年</option>
    <option value="quarter">按季度</option>
  </select>

    <label>选择日期：</label>
    <input class="Wdate" id="queryDay" name="day" type="text" style="width: 150px;">

    <label style="margin-left: 20px;">项目：</label>
  <select id="projectFilter" style="width: 150px;">
    <option value="-1">全部</option>
    <option th:each="project : ${session.projects}" th:value="${project.value_id}" th:text="${project.name}"></option>
  </select>
  
  <label style="margin-left: 20px;">搜索备注内容：</label>
  <input type="text" id="searchNote" style="width: 150px;">
  
  <input type="button" id="searchBtn" value="查询" style="margin-left: 10px;">
  <input type="button" id="resetBtn" value="重置" style="margin-left: 5px;">
</div>

<table class="display" id="dataTable" rules="all" style="width:100%">
  <thead>
  <tr>
    <th>账单号</th>
    <th>账单日期</th>
    <th>操作</th>
    <th>美发项目</th>
    <th>金额</th>
    <th>支付方式</th>
    <th>客户类型</th>
    <th>备注</th>
    <th>会员信息</th>
    <th>会员卡</th>
    <th>操作</th>
  </tr>
  </thead>
  <tbody>
  </tbody>
</table>

<script type="text/javascript">
/*<![CDATA[*/
$(document).ready(function() {
  // 日期格式映射
  var dateFormats = {
    day: 'yyyy-MM-dd',
    month: 'yyyy-MM',
    year: 'yyyy',
    quarter: 'yyyy-Q'
  };
  
  // 设置日期选择器
  function setDatePicker() {
    var dateDim = $('#dateDim').val();
    var format = dateFormats[dateDim] || 'yyyy-MM-dd';
    $('#queryDay').unbind('click');
    $('#queryDay').click(function() {
      WdatePicker({el: this, dateFmt: format});
    });
  }
  
  // 初始化日期选择器
  setDatePicker();
  
  // 日期维度变化时更新日期格式
  $('#dateDim').change(function() {
    setDatePicker();
    // 清空日期输入框，因为格式变了
    $('#queryDay').val('');
  });
  
  var table = $('#dataTable').DataTable({
    processing: true,
    serverSide: true,
    deferRender: true,
    paging: true,
    ordering: true,
    order: [ [0, 'desc'] ],
    info: true,
    lengthChange: true,
    searching: false,
    pagingType: 'full_numbers',
    ajax: {
      url: '/filter/showBillPage',
      type: 'POST',
      contentType: 'application/json',
      data: function(d) {
        d.day = $('#queryDay').val();
        d.search = $('#searchNote').val();
        d.project = parseInt($('#projectFilter').val());
        d.dateDim = $('#dateDim').val();
        return JSON.stringify(d);
      }
    },
    columns: [
      { data: 'id' },
      {
        data: 'date',
        render: function(data, type, row) {
          return data || '-';
        }
      },
      { data: 'operation' },
      { data: 'project' },
      { data: 'pay_amount' },
      { data: 'pay_method' },
      { data: 'role' },
      {
        data: 'note',
        render: function(data, type, row) {
          var note = data || '';
          if (note.length > 20) {
            return '<span title="' + note + '">' + note.substring(0, 20) + '...</span>';
          }
          return note;
        }
      },
      { data: 'vip' },
      { data: 'card' },
      {
        data: 'id',
        render: function(data, type, row) {
          return '<div class="nav-item dropdown">' +
                 '<a aria-expanded="false" class="nav-link dropdown-toggle no-padding" data-bs-toggle="dropdown" href="#" id="dropdown01">更多操作</a>' +
                 '<ul aria-labelledby="dropdown01" class="dropdown-menu">' +
                 '<li><a class="dropdown-item" href="/filter/toUpdateBill?billId=' + data + '">修改账单信息</a></li>' +
                 '</ul>' +
                 '</div>';
        }
      }
    ],
    language: {
      sProcessing: '处理中...',
      sLengthMenu: '显示 _MENU_ 项结果',
      sZeroRecords: '没有匹配结果',
      sInfo: '显示第 _START_ 至 _END_ 项结果，共 _TOTAL_ 项',
      sInfoEmpty: '显示第 0 至 0 项结果，共 0 项',
      sInfoFiltered: '(由 _MAX_ 项结果过滤)',
      sInfoPostFix: '',
      sSearch: '搜索:',
      sUrl: '',
      sEmptyTable: '表中数据为空',
      sLoadingRecords: '载入中...',
      sInfoThousands: ',',
      oPaginate: {
        sFirst: '首页',
        sPrevious: '上页',
        sNext: '下页',
        sLast: '末页'
      },
      oAria: {
        sSortAscending: ': 以升序排列此列',
        sSortDescending: ': 以降序排列此列'
      }
    }
  });
  
  $('#searchBtn').click(function() {
    table.ajax.reload();
  });
  
  $('#resetBtn').click(function() {
    $('#queryDay').val('');
    $('#searchNote').val('');
    $('#projectFilter').val('-1');
    $('#dateDim').val('day');
    setDatePicker();
    table.ajax.reload();
  });
  
  $('#searchNote, #queryDay').keypress(function(e) {
    if (e.which == 13) {
      $('#searchBtn').click();
    }
  });
});
/*]]>*/
</script>
</body>
</html>
